<style>/* ==========================================================================
   moss Comments Plugin - Styles

   Collapsible comment section with solid thread borders,
   underline-style form inputs, and responsive grid layout.
   Uses CSS custom properties from moss default.css.
   ========================================================================== */

/* ==========================================================================
   Design Decision Record: Flattened Comment Form
   --------------------------------------------------------------------------

   Research found that the best comment sections treat comments as editorial
   content on the same surface as the article, not as a separate widget.

   Six principles guide the comment form styling:

   P1. One surface
       Remove the tinted card background from .comment-form. Form and
       comments share the page background. Modeled after NYT/Guardian
       "Letters to the Editor" — comments as editorial content, same surface.

   P2. Border language consistency
       Comments use border-bottom: 1px solid. The form uses the same 1px
       border as its boundary, not a background fill + border-radius.

   P3. Typographic continuity
       Placeholder text, field labels, comment body, author names — same
       type family, proportional sizes. Follows iA design philosophy
       (ia.net): "web design is 95% typography", content-first.

   P4. The form is the first comment
       Visually, the compose area reads like an empty comment slot. Same
       padding rhythm, same width, same vertical spacing as comment items.
       Inspired by CSS-Tricks threading (css-tricks.com) — forms inline in
       thread, not separate cards.

   P5. Distinguish through state, not surface
       The textarea is interactive because of cursor/focus behavior, not
       because it sits on a different background. Focus states (accent
       underline) provide sufficient affordance.

   P6. Density matching
       Spacing between form elements echoes spacing between comment items.

   References:
   - NYT/Guardian "Letters to the Editor" model
   - Ahmad Shadeed's comment component (ishadeed.com)
   - CSS-Tricks threading (css-tricks.com)
   - iA design philosophy (ia.net)
   - ResultFirst 2026 trends — "stripping away non-essential frills"
   ========================================================================== */

/* Comment Section */
.moss-comments {
  margin-top: var(--moss-space-xl, 3rem);
  padding-top: var(--moss-space-lg, 2rem);
  border-top: 1px solid var(--moss-border-light, #e6e2db);
}

/* ==========================================================================
   Collapsible Details/Summary
   ========================================================================== */

.comments-toggle {
  display: flex;
  align-items: center;
  gap: var(--moss-space-xs, 0.5rem);
  cursor: pointer;
  list-style: none;
  font-size: var(--moss-font-sm, 1rem);
  color: var(--moss-color-muted, #8a8580);
  user-select: none;
  padding: 0;
}

/* Hide WebKit default disclosure triangle */
.comments-toggle::-webkit-details-marker {
  display: none;
}

.comments-toggle .comments-icon {
  flex-shrink: 0;
}

.comments-toggle:hover {
  color: var(--moss-color-text, #2c2825);
}

/* Chevron indicator — points right when collapsed, down when expanded */
.comments-toggle .comments-chevron {
  flex-shrink: 0;
  transition: transform 0.2s ease;
}

details[open] > .comments-toggle .comments-chevron {
  transform: rotate(90deg);
}

/* Space between summary and content when open */
details[open] > .comments-toggle {
  margin-bottom: var(--moss-space-md, 1.5rem);
}

/* ==========================================================================
   Comment List
   ========================================================================== */

.comment-list {
  list-style: none;
  padding: 0;
  margin: 0;
}

.comment-item {
  padding: var(--moss-space-md, 1.5rem) 0;
  border-bottom: 1px solid var(--moss-border-light, #e6e2db);
}

.comment-item:first-child {
  padding-top: 0;
}

.comment-item:last-child {
  border-bottom: none;
}

/* Comment Header: author name + date */
.comment-header {
  display: flex;
  align-items: baseline;
  gap: var(--moss-space-xs, 0.5rem);
  margin-bottom: var(--moss-space-xs, 0.5rem);
}

.comment-author {
  font-weight: 480;
  font-size: var(--moss-font-sm, 1rem);
  color: var(--moss-color-text, #2c2825);
  text-decoration: none;
}

a.comment-author:hover {
  color: var(--moss-color-accent, #2d5a2d);
}

.comment-date {
  font-size: 0.875rem;
  color: var(--moss-color-muted, #8a8580);
}

/* Comment Body */
.comment-body {
  font-size: var(--moss-font-size, 1.125rem);
  line-height: 1.7;
  color: var(--moss-color-text, #2c2825);
}

.comment-body p {
  margin: 0 0 var(--moss-space-sm, 1rem) 0;
}

.comment-body p:last-child {
  margin-bottom: 0;
}

.comment-body blockquote {
  font-size: inherit;
  font-style: normal;
  border-left: 3px solid var(--moss-color-muted, #8a8580);
  margin: var(--moss-space-xs, 0.5rem) 0 var(--moss-space-xs, 0.5rem) 1rem;
  padding-left: var(--moss-space-sm, 1rem);
  color: var(--moss-text-secondary, #5d5853);
}

.comment-body a {
  color: var(--moss-color-text, #2c2825);
  text-decoration: underline;
}

.comment-body a:hover {
  color: var(--moss-color-accent, #2d5a2d);
}

/* ==========================================================================
   Nested Replies — Solid Left Border Threading
   ========================================================================== */

.comment-replies {
  list-style: none;
  padding: 0 0 0 var(--moss-space-sm, 1rem);
  margin: 0 0 0 var(--moss-space-xs, 0.5rem);
  border-left: 2px solid var(--moss-border-medium, #d1cdc4);
}

.comment-replies .comment-item {
  padding: var(--moss-space-sm, 1rem) 0;
}

/* ==========================================================================
   Comment Form
   ========================================================================== */

.comment-form {
  padding: var(--moss-space-md, 1.5rem) 0;
  margin: 0 0 var(--moss-space-md, 1.5rem) 0;
}

/* Textarea — underline style */
.comment-form textarea {
  display: block;
  width: 100%;
  min-height: 3rem;
  padding: 0.25rem 0;
  border: none;
  border-bottom: 1px solid var(--moss-border-medium, #d1cdc4);
  font-family: inherit;
  font-size: var(--moss-font-size, 1.125rem);
  line-height: 1.7;
  color: var(--moss-color-text, #2c2825);
  background: transparent;
  resize: none;
  overflow: hidden;
  box-sizing: border-box;
  transition: border-color 0.15s ease;
}

.comment-form textarea:focus {
  outline: none;
  border-bottom: 2px solid var(--moss-color-accent, #2d5a2d);
}

.comment-form textarea::placeholder {
  color: var(--moss-color-muted, #8a8580);
}

/* ==========================================================================
   Form Meta Row — Name + Email + Website + Submit (single row on desktop)
   ========================================================================== */

.comment-form-meta {
  display: grid;
  grid-template-columns: 1fr 1.3fr 1.1fr auto;
  gap: 0.75rem;
  align-items: end;
  margin-top: var(--moss-space-sm, 1rem);
}

/* Underline-style input fields */
.comment-field {
  background: transparent;
  border: none;
  border-bottom: 1px solid var(--moss-border-medium, #d1cdc4);
  padding: 0.5rem 0;
  font-family: inherit;
  font-size: var(--moss-font-sm, 1rem);
  color: var(--moss-color-text, #2c2825);
  box-sizing: border-box;
  transition: border-color 0.15s ease;
  min-width: 0;
}

.comment-field:focus {
  outline: none;
  border-bottom: 2px solid var(--moss-color-accent, #2d5a2d);
}

.comment-field::placeholder {
  color: var(--moss-color-muted, #8a8580);
}

/* ==========================================================================
   Submit Button — Filled Tonal Style
   ========================================================================== */

.comment-form-submit {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  padding: 0.5rem 1.25rem;
  background: color-mix(in srgb, var(--moss-color-accent, #2d5a2d) 8%, transparent);
  border: none;
  border-radius: 6px;
  cursor: pointer;
  color: var(--moss-color-accent, #2d5a2d);
  font-family: inherit;
  font-size: var(--moss-font-sm, 1rem);
  font-weight: 480;
  transition: background 0.15s ease, color 0.15s ease;
}

.comment-form-submit:hover {
  background: color-mix(in srgb, var(--moss-color-accent, #2d5a2d) 15%, transparent);
}

.comment-form-submit:focus {
  outline: 2px solid var(--moss-color-accent, #2d5a2d);
  outline-offset: 2px;
}

.comment-form-submit:disabled {
  opacity: 0.5;
  cursor: not-allowed;
}

/* ==========================================================================
   Accessible Visually Hidden
   ========================================================================== */

.visually-hidden {
  position: absolute;
  width: 1px;
  height: 1px;
  padding: 0;
  margin: -1px;
  overflow: hidden;
  clip: rect(0, 0, 0, 0);
  white-space: nowrap;
  border: 0;
}

/* ==========================================================================
   Status Messages
   ========================================================================== */

.comment-form-status {
  margin-top: var(--moss-space-sm, 1rem);
  font-size: 0.875rem;
}

.comment-form-status:empty {
  display: none;
}

.comment-form-status--error {
  color: #a83232;
}

.comment-form-status--success {
  color: var(--moss-color-accent, #2d5a2d);
}

/* ==========================================================================
   Responsive
   ========================================================================== */

/* 2+2 layout: name+email on row 1, website+button on row 2 */
@media (max-width: 37.5rem) {
  .comment-form-meta {
    grid-template-columns: 1fr 1fr;
  }

  .comment-replies {
    padding-left: var(--moss-space-xs, 0.5rem);
    margin-left: 0.25rem;
  }
}

/* Full stack on very narrow screens */
@media (max-width: 25rem) {
  .comment-form-meta {
    grid-template-columns: 1fr;
  }

  .comment-form-submit {
    justify-self: end;
  }
}

    <form class="comment-form" id="moss-comment-form">
  <textarea id="moss-comment-text" name="content" required rows="2" placeholder="留下你的想法"></textarea>
  <div class="comment-form-meta">
    <input type="text" name="name" class="comment-field" placeholder="名字" required>
    <input type="email" name="email" class="comment-field" placeholder="邮箱（选填）">

    <script>(function() {
  var form = document.getElementById('moss-comment-form');
  if (!form) return;

  var textarea = document.getElementById('moss-comment-text');
  var statusEl = document.getElementById('moss-comment-status');
  var commentList = document.querySelector('.moss-comments .comment-list');

  // Auto-grow textarea
  if (textarea) {
    function autoGrow() {
      textarea.style.height = 'auto';
      textarea.style.height = textarea.scrollHeight + 'px';
    }
    textarea.addEventListener('input', autoGrow);
  }

  form.addEventListener('submit', function(e) {
    e.preventDefault();
    var btn = form.querySelector('.comment-form-submit');
    btn.disabled = true;
    btn.textContent = '提交中...';
    if (statusEl) { statusEl.textContent = ''; statusEl.className = 'comment-form-status'; }

    var body = {
      content: form.elements['content'].value,
      name: form.elements['name'].value,
      email: form.elements['email'].value,
      link: form.elements['link'].value || '',
      page_key: 'f409eff9',
      site_name: 'liu-guo.com',
      ua: navigator.userAgent
    };

    fetch('https://api.moss.host/comment/api/v2/comments', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    })
    .then(function(res) {
      if (!res.ok) {
        return res.json().catch(function() {
          throw new Error('Server error (' + res.status + ')');
        }).then(function(data) {
          throw new Error(data.msg || 'Server error (' + res.status + ')');
        });
      }
      return res.json();
    })
    .then(function(data) {
      btn.disabled = false;
      btn.textContent = '回复';

      if (statusEl) {
        statusEl.textContent = '评论已提交！';
        statusEl.className = 'comment-form-status comment-form-status--success';
      }

      if (!commentList) {
        commentList = document.createElement('ol');
        commentList.className = 'comment-list';
        form.after(commentList);
      }

      var li = document.createElement('li');
      li.className = 'comment-item';
      li.id = 'comment-' + data.id;
      var now = new Date().toLocaleDateString('zh-CN', {year:'numeric',month:'short',day:'numeric'});
      var authorName = body.name || 'Anonymous';
      li.innerHTML = '<div class="comment-header">'
        + '<span class="comment-author">' + authorName.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') + '</span>'
        + '<time class="comment-date">' + now + '</time>'
        + '</div>'
        + '<div class="comment-body"><p>' + body.content.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;') + '</p></div>';
      // Newest first: prepend so the just-submitted comment appears at the top
      commentList.insertBefore(li, commentList.firstChild);

      form.elements['content'].value = '';
      if (textarea) { textarea.style.height = 'auto'; }
    })
    .catch(function(err) {
      btn.disabled = false;
      btn.textContent = '回复';
      if (statusEl) {
        statusEl.textContent = err.message || '网络错误，请重试。';
        statusEl.className = 'comment-form-status comment-form-status--error';
      }
    });
  });

  /*
   * Stale-while-revalidate / progressive enhancement for comments.
   *
   * Static HTML already contains all comments known at build time, so the page
   * is immediately readable without JS. When the user opens the comment section
   * (<details> toggle), we fetch comments from the Artalk server that may have
   * been posted after the last build.
   *
   * Why date-based filtering instead of offset/count:
   *   Comments can be deleted or moderated between builds. A purely offset-based
   *   approach would miss or duplicate entries. By comparing each comment's
   *   created_at against the build timestamp (data-built-at), we robustly find
   *   only the comments that are genuinely new.
   *
   * Three-layer deduplication:
   *   1. Date boundary  — stop iterating when we hit a comment older than the
   *      build timestamp (comments are sorted newest-first).
   *   2. ID guard       — skip any comment whose DOM node already exists
   *      (handles edge cases where build-time and fetch overlap).
   *   3. Fire-once listener — the toggle handler removes itself after the first
   *      invocation so we never fetch twice.
   *
   * Trust model: Artalk performs server-side HTML sanitization, so we use
   * innerHTML for comment content (same as the static render path).
   */
  var section = document.getElementById('moss-comments');
  var builtAtStr = section && section.getAttribute('data-built-at');
  var builtAtMs = builtAtStr ? new Date(builtAtStr).getTime() : 0;
  var details = section && section.querySelector('details');

  if (details && builtAtMs) {
    function onToggle() {
      if (!details.open) return;
      details.removeEventListener('toggle', onToggle);

      fetch('https://api.moss.host/comment/api/v2/comments?page_key=f409eff9&site_name=liu-guo.com&flat_mode=true&sort_by=date_desc&limit=100')
        .then(function(res) { return res.ok ? res.json() : null; })
        .then(function(json) {
          if (!json) return;
          var list = (json.data && json.data.comments) || [];
          var added = 0;
          // Anchor = first build-time comment. Hydrated comments go before it
          // to maintain newest-first order (API returns date_desc).
          var anchor = commentList ? commentList.firstChild : null;
          for (var i = 0; i < list.length; i++) {
            var c = list[i];
            if (new Date(c.created_at).getTime() <= builtAtMs) break;
            if (document.getElementById('comment-' + c.id)) continue;

            var li = document.createElement('li');
            li.className = 'comment-item';
            li.id = 'comment-' + c.id;
            var authorName = (c.nick || 'Anonymous').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
            var dateStr = new Date(c.created_at).toLocaleDateString('zh-CN', {year:'numeric',month:'short',day:'numeric'});
            li.innerHTML = '<div class="comment-header">'
              + '<span class="comment-author">' + authorName + '</span>'
              + '<time class="comment-date">' + dateStr + '</time>'
              + '</div>'
              + '<div class="comment-body">' + c.content + '</div>';

            if (!commentList) {
              commentList = document.createElement('ol');
              commentList.className = 'comment-list';
              var formEl = document.getElementById('moss-comment-form');
              if (formEl) formEl.after(commentList);
              anchor = null;
            }
            // Newest first: insert before the anchor (first build-time comment)
            commentList.insertBefore(li, anchor);
            added++;
          }

          if (added > 0) {
            var total = (commentList ? commentList.children.length : 0);
            var summarySpan = details.querySelector('summary span');
            if (summarySpan) {
              summarySpan.textContent = total === 1 ? '1条评论' : '{n}条评论'.replace('{n}', total);
            }
          }
        })
        .catch(function() { /* silent — static comments still visible */ });
    }
    details.addEventListener('toggle', onToggle);
  }
})();</script>
